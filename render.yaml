services:
  - type: web
    name: museum-kirov
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      mkdir -p /opt/render/project/src/media
    startCommand: gunicorn museum.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: museum-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
    disk:
      name: museum-media
      mountPath: /opt/render/project/src/media
      sizeGB: 1

databases:
  - name: museum-db
    databaseName: museum
    user: museum_user
    plan: free
